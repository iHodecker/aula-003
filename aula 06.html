        <!-- Formularios -->

        <section>
            <h2>Formulários</h2>
            <form method="post" action="">
                <fieldset>
                    <legend>Dados pessoais</legend>
                    <label for="">Nome:</label>
                    <input required placeholder="escreva seu nome" type="text" id="Nome" name="nome">
                    <br>
                    <label for="">Email:</label>
                    <input placeholder="escreva seu email" type="email" id="email" name="email" value="@unifebe.edu.br">
                </fieldset>
                
                <fieldset>
                    <legend>Seleção de listas</legend>
                    <label for="Estado"></label>
                    <select name="estado selecionado" id="estado">
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Qual o melhor período de estudo?</legend>
                    <input type="radio" id="Manha" name="perido">
                    <label for="manha">manha</label>

                    <input type="radio" id="tarde" name="perido">
                    <label for="tarde">tarde</label>

                    <input type="radio" id="noite" name="perido">
                    <label for="noite">noite</label>
                </fieldset>

                <fieldset>
                    <legend>Lista de compras</legend>
                    <input type="checkbox" id="Doritos">
                    <label for="Doritos">Doritos</label>
                    <br>
                    <input type="checkbox" id="coca">
                    <label for="coca">Coca-Cola</label>
                    <br>
                    <input type="checkbox" id="Chocolate">
                    <label for="Chocolate">Chocolate</label>
                    <br>
                    <input type="checkbox" id="Carne">
                    <label for="Carne">Carne</label>
                </fieldset>

                <fieldset>
                    <legend>Comentários</legend>
                    <textarea name="comentario" id="comentario" cols="30" rows="10"></textarea>
                </fieldset>
                
                <input type="submit">
                <input type="reset">
                
            </form>
        </section>
